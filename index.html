<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #f4efe6;
  --ink:   #2a1f0f;
  --dim:   #7a6a50;
  --amber: #8a5f1a;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
}

#bg-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem;
  gap: 1rem;
}

#page-title {
  font-family: 'IM Fell English', Georgia, serif;
  font-size: clamp(1rem, 2.2vw, 1.5rem);
  letter-spacing: 0.06em;
  color: var(--dim);
  text-align: center;
  font-style: italic;
}

#scene-wrapper {
  position: relative;
  width: min(860px, 94vw);
  image-rendering: pixelated;
}

#scene-wrapper img {
  display: block;
  width: 100%;
  height: auto;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* Hover overlays — positioned over left and right halves */
.path-overlay {
  position: absolute;
  top: 0;
  height: 85%;
  width: 48%;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}

#overlay-left  { left: 0; }
#overlay-right { right: 0; }

.path-overlay:hover {
  background: rgba(255, 240, 180, 0.12);
  outline: 2px solid rgba(200, 160, 60, 0.35);
  outline-offset: -2px;
}

/* Labels row below the image */
#path-labels {
  display: flex;
  width: min(860px, 94vw);
  justify-content: space-between;
}

.path-label {
  width: 48%;
  text-align: center;
  pointer-events: none;
}

.path-label .label-title {
  display: block;
  font-family: 'IM Fell English', Georgia, serif;
  font-size: clamp(0.9rem, 1.8vw, 1.2rem);
  color: var(--amber);
  margin-bottom: 0.2rem;
  transition: color 0.2s;
}

.path-label .label-sub {
  display: block;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: clamp(0.75rem, 1.3vw, 0.92rem);
  color: var(--dim);
  font-style: italic;
  line-height: 1.4;
}

.ornament {
  color: rgba(100, 80, 40, 0.28);
  font-size: 0.85rem;
  letter-spacing: 0.2em;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">
  <div id="page-title">Two paths diverge. Choose wisely — or don't.</div>

  <div id="scene-wrapper">
    <img src="crossroads.png" alt="A pixel art fork in the road" id="scene-img">

    <a id="overlay-left"  class="path-overlay" href="aesthetics.html" aria-label="Aesthetics game"></a>
    <a id="overlay-right" class="path-overlay" href="lottery.html" aria-label="Lottery Tickets game"></a>
  </div>

  <div id="path-labels">
    <div class="path-label" id="label-left">
      <span class="label-title">Aesthetics</span>
      <span class="label-sub">Rate the beauty of<br>geoengineering solutions</span>
    </div>
    <div class="path-label" id="label-right">
      <span class="label-title">Lottery Tickets</span>
      <span class="label-sub">Test your luck and<br>judgment together</span>
    </div>
  </div>

  <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
</div>

<script>
const bgC   = document.getElementById('bg-canvas');
const bgCtx = bgC.getContext('2d');
let pts = [];

function resizeBg() {
  bgC.width  = window.innerWidth;
  bgC.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

for (let i = 0; i < 80; i++) {
  pts.push({
    x:  Math.random() * window.innerWidth,
    y:  Math.random() * window.innerHeight,
    r:  Math.random() * 1.4 + 0.2,
    b:  Math.random() * 0.45 + 0.05,
    s:  Math.random() * 0.004 + 0.001,
    ph: Math.random() * Math.PI * 2
  });
}

(function drawBg(t) {
  bgCtx.clearRect(0, 0, bgC.width, bgC.height);
  for (const p of pts) {
    const o = p.b + Math.sin(t * 0.001 * p.s * 1000 + p.ph) * 0.12;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(100,75,30,${Math.max(0, o * 0.18)})`;
    bgCtx.fill();
  }
  requestAnimationFrame(drawBg);
})(0);

[['overlay-left','label-left'],['overlay-right','label-right']].forEach(([ol, lb]) => {
  const overlay = document.getElementById(ol);
  const title   = document.getElementById(lb).querySelector('.label-title');
  overlay.addEventListener('mouseenter', () => title.style.color = '#b07d2a');
  overlay.addEventListener('mouseleave', () => title.style.color = '');
});
</script>
</body>
</html>
